name = "aura-server"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Fill database_id after: npx wrangler d1 create aura-feedback
[[d1_databases]]
binding = "DB"
database_name = "aura-feedback"
database_id = "REPLACE_AFTER_D1_CREATE"

[vars]
# CORS allowlist for the one open route (/feedback). No TOKEN_SECRET here —
# unlike the other lantern servers, this Worker has no accounts to sign tokens for.
ALLOWED_ORIGIN = "https://aura-1hd.pages.dev,https://auravibe.app"
